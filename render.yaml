# Render Blueprint: Kotlin/Spring Boot в Docker (корневой Dockerfile собирает backend-kotlin).
# В Render: Runtime = Docker, Dockerfile Path = Dockerfile, Root Directory пустой,
# Build Command и Start Command пустые.

services:
  - type: web
    name: attendance-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /api/health
